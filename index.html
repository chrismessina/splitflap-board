  <label class="field">
    <span>Text</span>
    <input id="message" type="text" value="HELLO" autocomplete="off">
  </label>

  <!-- =================== Appearance =================== -->
  <fieldset class="group">
    <legend>Appearance</legend>

    <div class="field">
      <span class="field-label">Color theme</span>
      <div class="row">
        <select id="theme"></select>
        <button id="importTheme" type="button" class="ghost compact">Import</button>
      </div>

      <!-- Theme editor: visible whenever a custom or in-progress theme is
           selected. Hidden for built-ins (Black / White). -->
      <div id="themeEditor" class="theme-editor" hidden>
        <input id="themeName" type="text" placeholder="Theme name">

        <div class="hex-grid">
          <label class="hex-row" data-field="bg">
            <span class="hex-label">Background</span>
            <span class="hex-well" data-pickfor="bg"></span>
            <input class="hex-text" data-field="bg" type="text" maxlength="7" spellcheck="false">
            <button type="button" class="hex-pencil" data-pickfor="bg" aria-label="Edit background">
              <!-- pencil SVG; click also forwards to the native color picker -->

            <button type="button" class="hex-pencil" data-pickfor="tile" aria-label="Edit tile">
              <svg viewBox="0 0 20 20" width="14" height="14" aria-hidden="true">

              </svg>
            </button>
          </label>

          <label class="hex-row" data-field="text">
            <span class="hex-label">Text</span>
            <span class="hex-well" data-pickfor="text"></span>
            <input class="hex-text" data-field="text" type="text" maxlength="7" spellcheck="false">
            <button type="button" class="hex-pencil" data-pickfor="text" aria-label="Edit text color">

              </svg>
            </button>
          </label>

          <label class="hex-row" data-field="accent">
            <span class="hex-label">Accent</span>
            <span class="hex-well" data-pickfor="accent"></span>
            <input class="hex-text" data-field="accent" type="text" maxlength="7" spellcheck="false">
            <button type="button" class="hex-pencil" data-pickfor="accent" aria-label="Edit accent">

            </button>
          </label>
        </div>

        <!-- Hidden native color picker, anchored under whichever well/pencil was clicked. -->
        <input id="nativeColor" type="color" tabindex="-1" aria-hidden="true">

        <div class="editor-actions">
          <button id="themeSave" type="button" class="primary compact">Save</button>
          <button id="themeDelete" type="button" class="ghost compact danger" hidden>Delete</button>
        </div>
      </div>
    </div>

    <label class="toggle">
      <input id="bits" type="checkbox">
      <span>Show colored bits</span>
    </label>

    <label class="field">
      <span>Typeface</span>
      <select id="font">
        <option value='300 1em "Geist Mono", "Helvetica Neue", monospace' selected>Geist Mono Light</option>
        <option value='500 1em "Inter", "Helvetica Neue", sans-serif'>Inter</option>
        <option value='400 1em "DM Mono", monospace'>DM Mono</option>
        <option value='400 1em "Oswald", sans-serif'>Oswald (condensed)</option>
        <option value='400 1em "Source Sans 3", sans-serif'>Source Sans (humanist)</option>
      </select>
    </label>

    <div class="row">
      <label class="field">
        <span>Rows</span>
        <input id="rows" type="number" min="1" max="12" value="1">
      </label>
      <label class="field">
        <span>Columns</span>
        <input id="cols" type="number" min="1" max="44" value="5">
      </label>
    </div>
    <button id="resetGrid" class="ghost">Reset grid to text length</button>
  </fieldset>

  <!-- =================== Animation =================== -->
  <fieldset class="group">
    <legend>Animation</legend>

    <label class="field">
      <span>Flips per cell <small>(base; jittered per cell)</small></span>
      <input id="flips" type="number" min="1" max="60" value="12">
    </label>

    <label class="field">
      <span>Speed <small>(<output id="speedOut">70</output> ms / flip)</small></span>
      <input id="speed" type="range" min="20" max="180" value="70">
    </label>

    <label class="toggle">
      <input id="loop" type="checkbox">
      <span>Auto-loop</span>
    </label>
  </fieldset>

  <!-- =================== Sound =================== -->
  <fieldset class="group">
    <legend>Sound</legend>

    <label class="toggle">
      <input id="sound" type="checkbox">
      <span>Enable sound</span>
    </label>

    <label class="field">
      <span>Sound style</span>
      <select id="soundStyle">
        <option value="dry" selected>Dry tick</option>
        <option value="woody">Woody</option>
        <option value="sharp">Sharp</option>
        <option value="random">Random</option>
      </select>
    </label>
  </fieldset>

  <!-- =================== Export =================== -->
  <fieldset class="group">
    <legend>Export</legend>

    <label class="field">
      <span>Video format</span>
      <select id="format"></select>
    </label>

    <div class="actions">
      <button id="flip" class="primary">Flip</button>
      <button id="record" class="primary" disabled>Record &amp; Download</button>
    </div>

    <p class="hint">Recording exports 1920×1080. Only formats your browser can encode are listed.</p>
    <p id="status" class="status"></p>
  </fieldset>
</aside>

<!-- Hidden file input + dialog for theme import -->
<dialog id="importDialog">
  <form method="dialog">
    <h2>Import color theme</h2>
    <p class="dialog-hint">Paste a comma-separated list of hex colors —
      ideally 4 (background, tile, text, accent). Slack's share format works.</p>
    <textarea id="importText" rows="3" placeholder="#0a0a0a, #161616, #f4f4f4, #ff7a59"></textarea>
    <p id="importError" class="status"></p>
    <div class="dialog-actions">
      <button value="cancel" class="ghost">Cancel</button>
      <button id="importConfirm" value="ok" class="primary">Import</button>
    </div>
  </form>
</dialog>

<script src="app.js?v=9"></script>
</body>
</html>
